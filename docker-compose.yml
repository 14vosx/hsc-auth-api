version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: hsc-auth-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: hsc_auth
      MARIADB_USER: hsc
      MARIADB_PASSWORD: hsc
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
